name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Locked tests, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
          python-version: "3.11"
          enable-cache: true

      - name: Reject a stale dependency lock
        run: uv lock --check

      - name: Install the locked development environment
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Test
        run: uv run --frozen pytest -q

      - name: Build distributions
        run: uv build

  secrets:
    name: Secret history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan changed history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
